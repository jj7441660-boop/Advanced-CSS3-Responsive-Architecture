<!DOCTYPE html>
<html>
<head>
<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
font-size:16px;
background:lightblue;
}

.container{
padding:20px;
}

@media(min-width:768px){
body{
background:lightgreen;
font-size:20px;
}
}

@media(min-width:1024px){
body{
background:lightpink;
font-size:24px;
}
}

</style>
</head>

<body>

<div class="container">
<h1>Responsive Website</h1>
<p>Changes according to screen size.</p>
</div>

</body>
</html>

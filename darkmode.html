<!DOCTYPE html>
<html>
<head>
<style>

:root{
--bg:white;
--text:black;
}

.dark{
--bg:black;
--text:white;
}

body{
background:var(--bg);
color:var(--text);
text-align:center;
padding-top:100px;
}

button{
padding:10px 20px;
}

</style>
</head>

<body id="body">

<h1>Light/Dark Mode</h1>

<button onclick="changeTheme()">
Toggle Theme
</button>

<script>

function changeTheme(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
